services:
  external:
    image: fairdatasystems/sevexternal:2026-04-24
    ports: ["3000:3000"]
    env_file:
      - .env
    volumes:
      - "./data:/data"
      - "./queries-metadata:/queries-metadata"
    environment:
      - RACK_ENV=production
      - APP_ENV=production     # both for redundancy

