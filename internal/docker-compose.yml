services:

  internal:
    image: fairdatasystems/sevinternal:2026-04-16
    network_mode: host
    volumes:
      - "./queries:/queries"
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    environment:
      - TMPDIR=/tmp
      - UID=${UID:-1000}   # see README file for how to set this
      - GID=${GID:-1000}   # see README file for how to set this

    env_file: .env
    user: "${UID:-1000}:${GID:-1000}"   # Run container as your host user, or 1000 fallback (which is usually the first non-root user created on a Linux system)  
    